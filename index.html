<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="/styles/app.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>

<body>
    <header><img src="/assets/img/Logo.svg" alt="Logo Wordle"></header>
    <hr>
    <main>
        <section id="board">
            <div class="container-board">
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
            </div>
        </section>
        <section id="teclado">
            <div class="Linha">
                <button class="button" value="Q">Q</button>
                <button class="button" value="W">W</button>
                <button class="button" value="E">E</button>
                <button class="button" value="R">R</button>
                <button class="button" value="T">T</button>
                <button class="button" value="Y">Y</button>
                <button class="button" value="U">U</button>
                <button class="button" value="I">I</button>
                <button class="button" value="O">O</button>
                <button class="button" value="P">P</button>
            </div>
            <div class="Linha">
                <button class="button" value="A">A</button>
                <button class="button" value="S">S</button>
                <button class="button" value="D">D</button>
                <button class="button" value="F">F</button>
                <button class="button" value="G">G</button>
                <button class="button" value="H">H</button>
                <button class="button" value="J">J</button>
                <button class="button" value="K">K</button>
                <button class="button" value="L">L</button>
            </div>
            <div class="Linha">
                <button class="button" id="ENTER" value="ENTER">ENTER</button>
                <button class="button" value="Z">Z</button>
                <button class="button" value="X">X</button>
                <button class="button" value="C">C</button>
                <button class="button" value="V">V</button>
                <button class="button" value="B">B</button>
                <button class="button" value="N">N</button>
                <button class="button" value="M">M</button>
                <button class="button" id="BACKSPACE" value="BACKSPACE">⌫</button>
            </div>

        </section>
        <button id="btn-reiniciar" style="display: none;" onclick="reiniciarJogo()">
            Jogar Novamente
        </button>
    </main>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./script/app.js"></script>
</body>

</html>
