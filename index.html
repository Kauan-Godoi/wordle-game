<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body>
    <header><img src="/assets/img/Logo.svg" alt="Logo Wordle"></header>
    <hr>
    <main>
        <section id="board">
            <div class="container-board">
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                 <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                 <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                 <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                 <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
                <div class="row">
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                    <div class="square">
                    </div>
                </div>
            </div>      
        </section>
        <section id="teclado">
            <div class="Linha">
                <button class="button" id="Q">Q</button>
                <button class="button" id="W">W</button>
                <button class="button" id="E">E</button>
                <button class="button" id="R">R</button>
                <button class="button" id="T">T</button>
                <button class="button" id="Y">Y</button>
                <button class="button" id="U">U</button>
                <button class="button" id="I">I</button>
                <button class="button" id="O">O</button>
                <button class="button" id="P">P</button>
            </div>
            <div class="Linha">
                <button class="button" id="A">A</button>
                <button class="button" id="S">S</button>
                <button class="button" id="D">D</button>
                <button class="button" id="F">F</button>
                <button class="button" id="G">G</button>
                <button class="button" id="H">H</button>
                <button class="button" id="J">J</button>
                <button class="button" id="K">K</button>
                <button class="button" id="L">L</button>
            </div>
            <div class="Linha">
                <button class="button" id="enter">ENTER</button>
                <button class="button" id="Z">Z</button>
                <button class="button" id="X">X</button>
                <button class="button" id="C">C</button>
                <button class="button" id="V">V</button>
                <button class="button" id="B">B</button>
                <button class="button" id="N">N</button>
                <button class="button" id="M">M</button>
                <button class="button" id="backspace">⌫</button>
            </div>
        </section>
    </main>
    <script src="script/app.js"></script>
</body>
</html>
